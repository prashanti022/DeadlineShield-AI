
<!DOCTYPE html>
<html>
<head>
<title>DeadlineShield AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🚀 DeadlineShield AI</h1>
<button onclick="toggleMode()">🌙</button>
</header>

<div class="container">

<div class="card">
<h2>Add Task</h2>

<input id="task" placeholder="Enter task">

<input type="date" id="date">

<select id="priority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<button onclick="addTask()">Add Task</button>

</div>


<div class="dashboard">

<div class="box">
<h3>Total</h3>
<p id="total">0</p>
</div>

<div class="box">
<h3>Completed</h3>
<p id="complete">0</p>
</div>

<div class="box">
<h3>Productivity</h3>
<p id="score">0%</p>
</div>

</div>


<h2>📌 Tasks</h2>

<div id="taskList"></div>


<div class="card">

<h2>🤖 Auto Planner</h2>

<p id="planner">
Add tasks to generate plan
</p>

</div>


<div class="card">

<h2>⏳ Focus Timer</h2>

<h1 id="timer">25:00</h1>

<button onclick="startTimer()">Start</button>

</div>


</div>


<script src="script.js"></script>

</body>
  </html>
